<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#f0f0f0;">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:0 auto;font-family:'Georgia',serif;">
  <tr>
    <td>
      <!--[if gte mso 9]>
      <v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false" style="width:600px;height:840px;">
      <v:fill type="frame" src="{{template_image:rainbow_birthday_bg.png}}" />
      <v:textbox inset="0,0,0,0">
      <![endif]-->
      <table width="100%" cellpadding="0" cellspacing="0" style="background-image:url('{{template_image:rainbow_birthday_bg.png}}');background-size:100% auto;background-position:center top;background-repeat:no-repeat;background-color:#f5f5f5;">

        <!-- Top spacer -->
        <tr>
          <td style="height:100px;font-size:0;line-height:0;" aria-hidden="true">&nbsp;</td>
        </tr>

        <!-- Title area (between hearts row and rainbow) -->
        <tr>
          <td style="height:90px;text-align:center;vertical-align:middle;padding:0 60px;">
            <p style="color:#e84393;font-size:13px;letter-spacing:5px;text-transform:uppercase;margin:0 0 6px;font-weight:600;">You're Invited!</p>
            <h1 style="color:#2d3436;font-size:26px;margin:0;font-weight:700;line-height:1.2;">{{title}}</h1>
          </td>
        </tr>

        <!-- Middle spacer: covers rainbow + decorations -->
        <tr>
          <td style="height:330px;font-size:0;line-height:0;" aria-hidden="true">&nbsp;</td>
        </tr>

        <!-- Details section: below all decorations -->
        <tr>
          <td style="text-align:center;padding:0 60px 20px;">
            <!-- Photo (optional, shown if event has a photo) -->
            <div style="display:{{photo_display}};text-align:center;margin:0 0 12px;">
              <img src="{{photo_url}}" alt="Event photo" style="max-width:140px;border-radius:50%;border:3px solid #e84393;box-shadow:0 2px 12px rgba(0,0,0,0.12);">
            </div>

            <!-- Guest greeting and message on white background for readability -->
            <div style="background:rgba(255,255,255,0.9);border-radius:12px;padding:16px 20px;margin:0 0 14px;">
              <p style="color:#2d3436;font-size:15px;margin:0 0 6px;">
                Dear <strong>{{guest_name}}</strong>,
              </p>
              <p style="color:#636e72;font-size:13px;line-height:1.5;margin:0;">{{message}}</p>
            </div>

            <!-- Event details -->
            <table width="100%" cellpadding="0" cellspacing="0" style="margin:0 auto 14px;max-width:320px;">
              <tr>
                <td style="background:rgba(255,255,255,0.85);border-radius:12px;padding:14px 18px;">
                  <table width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="padding:4px 0;text-align:center;">
                        <span style="font-size:15px;">&#128197;</span>
                        <span style="color:#2d3436;font-size:14px;font-weight:bold;margin-left:4px;">{{date}}</span>
                      </td>
                    </tr>
                    <tr>
                      <td style="padding:4px 0;text-align:center;">
                        <span style="font-size:15px;">&#128336;</span>
                        <span style="color:#2d3436;font-size:14px;font-weight:bold;margin-left:4px;">{{time}}</span>
                      </td>
                    </tr>
                    <tr>
                      <td style="padding:4px 0;text-align:center;">
                        <span style="font-size:15px;">&#128205;</span>
                        <span style="color:#2d3436;font-size:14px;font-weight:bold;margin-left:4px;">{{location}}</span>
                      </td>
                    </tr>
                    {{host_row}}
                  </table>
                </td>
              </tr>
            </table>

            <!-- RSVP Button -->
            <a href="{{rsvp_url}}" style="display:inline-block;background:linear-gradient(135deg,#e84393,#fd79a8);color:#fff;padding:12px 36px;border-radius:50px;text-decoration:none;font-size:16px;font-weight:bold;letter-spacing:1px;box-shadow:0 3px 12px rgba(232,67,147,0.35);">
              RSVP Now &#127880;
            </a>

            <p style="color:#b2bec3;font-size:10px;margin:12px 0 8px;">
              <a href="{{rsvp_url}}" style="color:#b2bec3;">{{rsvp_url}}</a>
            </p>
          </td>
        </tr>

      </table>
      <!--[if gte mso 9]>
      </v:textbox>
      </v:rect>
      <![endif]-->
    </td>
  </tr>
</table>
</body>
</html>
